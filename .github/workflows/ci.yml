name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  backend:
    name: Backend (Node + PostgreSQL)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: somafrik
          POSTGRES_USER: somafrik
          POSTGRES_PASSWORD: somafrik123
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U somafrik -d somafrik"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install backend dependencies
        working-directory: backend
        run: npm install

      - name: Smoke test backend boot + health
        working-directory: backend
        env:
          NODE_ENV: test
          PORT: 5000
          JWT_SECRET: ci-test-secret
          DATABASE_URL: postgresql://somafrik:somafrik123@localhost:5432/somafrik
          SOMAFRIK_DB_REQUIRED: "true"
        run: |
          node server.js &
          SERVER_PID=$!
          for i in $(seq 1 20); do
            if curl -sf http://127.0.0.1:5000/api/health > /dev/null; then
              echo "Backend healthy"
              kill $SERVER_PID
              exit 0
            fi
            sleep 2
          done
          echo "Backend did not become healthy in time"
          kill $SERVER_PID || true
          exit 1

  web:
    name: Web (React + Tailwind)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install web dependencies
        working-directory: web
        run: npm install

      - name: Type-check
        working-directory: web
        run: npm run typecheck

      - name: Build
        working-directory: web
        run: npm run build
