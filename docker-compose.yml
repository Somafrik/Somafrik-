name: somafrik

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-somafrik}
      POSTGRES_USER: ${POSTGRES_USER:-somafrik}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-somafrik123}
    ports:
      - "${POSTGRES_HOST_PORT:-5433}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-somafrik} -d ${POSTGRES_DB:-somafrik}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    image: somafrik-backend:latest
    restart: unless-stopped
    ports:
      - "${BACKEND_PORT:-5000}:5000"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: 5000
      DATABASE_URL: postgresql://${POSTGRES_USER:-somafrik}:${POSTGRES_PASSWORD:-somafrik123}@postgres:5432/${POSTGRES_DB:-somafrik}
      JWT_SECRET: ${JWT_SECRET:-somafrik-dev-secret-change-me}
      CORS_ORIGINS: ${CORS_ORIGINS:-*}
      SOMAFRIK_DB_REQUIRED: ${SOMAFRIK_DB_REQUIRED:-true}
      JSON_BODY_LIMIT: ${JSON_BODY_LIMIT:-1mb}
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:5000/api/health >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 40s

  web-dev:
    image: node:22-alpine
    working_dir: /web
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${WEB_DEV_PORT:-5173}:5173"
    environment:
      VITE_API_TARGET: http://backend:5000
      CHOKIDAR_USEPOLLING: "true"
    volumes:
      - ./web:/web
      - web_node_modules:/web/node_modules
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5173"

  mobile:
    image: node:22-alpine
    working_dir: /app/Mobile
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${EXPO_PORT:-8083}:${EXPO_PORT:-8083}"
    environment:
      EXPO_DEVTOOLS_LISTEN_ADDRESS: 0.0.0.0
      EXPO_PORT: ${EXPO_PORT:-8083}
      EXPO_PUBLIC_API_URL: ${EXPO_PUBLIC_API_URL:-http://localhost:5000}
      EXPO_PUBLIC_DEMO_MODE: ${EXPO_PUBLIC_DEMO_MODE:-false}
      REACT_NATIVE_PACKAGER_HOSTNAME: ${REACT_NATIVE_PACKAGER_HOSTNAME:-localhost}
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - .:/app
      - mobile_node_modules:/app/Mobile/node_modules
    command: sh -c "npm install && npx expo start --host lan --port $${EXPO_PORT:-8083} --clear"

volumes:
  postgres_data:
  web_node_modules:
  mobile_node_modules:
