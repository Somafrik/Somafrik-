name: somafrik

services:
  postgres:
    image: postgres:16
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-somafrik}
      POSTGRES_USER: ${POSTGRES_USER:-somafrik}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-somafrik123}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-somafrik} -d ${POSTGRES_DB:-somafrik}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: always
    ports:
      - "${BACKEND_PORT:-5000}:5000"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: 5000
      DATABASE_URL: postgresql://${POSTGRES_USER:-somafrik}:${POSTGRES_PASSWORD:-somafrik123}@postgres:5432/${POSTGRES_DB:-somafrik}
      JWT_SECRET: ${JWT_SECRET:-somafrik-dev-secret-change-me}
      CORS_ORIGINS: ${CORS_ORIGINS:-*}
      SOMAFRIK_DB_REQUIRED: ${SOMAFRIK_DB_REQUIRED:-true}
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:5000/api/health >/dev/null 2>&1"]
      interval: 15s
      timeout: 5s
      retries: 5

  mobile:
    image: node:22
    working_dir: /app/Mobile
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${EXPO_PORT:-8081}:${EXPO_PORT:-8081}"
    environment:
      EXPO_DEVTOOLS_LISTEN_ADDRESS: 0.0.0.0
      EXPO_PORT: ${EXPO_PORT:-8081}
      EXPO_PUBLIC_API_URL: ${EXPO_PUBLIC_API_URL:-http://${REACT_NATIVE_PACKAGER_HOSTNAME:-localhost}:5000}
      EXPO_PUBLIC_DEMO_MODE: ${EXPO_PUBLIC_DEMO_MODE:-false}
      REACT_NATIVE_PACKAGER_HOSTNAME: ${REACT_NATIVE_PACKAGER_HOSTNAME:-localhost}
    volumes:
      - .:/app
      - mobile_node_modules:/app/Mobile/node_modules
    command: sh -c "npm install && npx expo start --host lan --port $${EXPO_PORT:-8081} --clear"

volumes:
  postgres_data:
  mobile_node_modules:
