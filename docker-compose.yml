services:
  postgres:
    image: postgres:16
    container_name: schoollink-postgres
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-schoollink}
      POSTGRES_USER: ${POSTGRES_USER:-schoollink}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-schoollink123}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-schoollink} -d ${POSTGRES_DB:-schoollink}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: schoollink-backend
    restart: always
    ports:
      - "${BACKEND_PORT:-5000}:5000"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: 5000
      DATABASE_URL: postgresql://${POSTGRES_USER:-schoollink}:${POSTGRES_PASSWORD:-schoollink123}@postgres:5432/${POSTGRES_DB:-schoollink}
      JWT_SECRET: ${JWT_SECRET:-schoollink-dev-secret-change-me}
      CORS_ORIGINS: ${CORS_ORIGINS:-*}
      SCHOOLLINK_DB_REQUIRED: ${SCHOOLLINK_DB_REQUIRED:-true}
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:5000/api/health >/dev/null 2>&1"]
      interval: 15s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
